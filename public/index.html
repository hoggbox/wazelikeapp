<!DOCTYPE html>
<html lang="en">
<head>

  <style>

    @media (max-width: 414px) {
      #hazard-button {

      #recenter-button {

      #report-box header {

      }
      .report-options {

      .report-button {

      }
      #toast {

      #reroute-hud-container {
        width: 80vw;
        max-width: 320px;

      #reroute-hud-container header {

    @media (min-width: 769px) {

        width: 5vw;
        height: 5vw;

      }

      }
      #recenter-button {
        width: 5vw;
        height: 5vw;
        max-width: 40px;

      #recenter-button::before {

      }
      #report-box {

<body>
  <div id="map"></div>
  <div id="search-container">
    <input id="search-input" type="text" placeholder="Enter destination address">
    <button id="start-button">Start</button>
  </div>
  <div id="hud-container">
    <div id="hud-turn">Follow the road</div>
    <div id="hud-street">Current street: Unknown</div>
    <div id="hud-heading">Heading: Unknown</div>
  </div>
  <div id="bottom-hud-container">
    <button id="bottom-hud-stop">X</button>
    <div id="bottom-hud-info">
      <div id="bottom-hud-time">0 Mins</div>
      <div id="bottom-hud-distance">0 miles - Unknown</div>
    </div>
  </div>
  <div id="hazard-button"></div>
  <div id="recenter-button"></div>
  <div class="report-container">
    <div id="report-box">
      <header>
        <button id="report-close">X</button>
      </header>
      <div class="report-options">
        <div class="report-button" data-alert-type="Slowdown"><i class="fas fa-car"></i>Slowdown&nbsp;</div>
        <div class="report-button" data-alert-type="Crash"><i class="fas fa-car-crash"></i>Crash&nbsp;</div>
        <div class="report-button" data-alert-type="Construction"><i class="fas fa-tools"></i>Construction&nbsp;</div>
        <div class="report-button" data-alert-type="Police"><i class="fas fa-user-shield"></i>Police&nbsp;</div>
        <div class="report-button" data-alert-type="Object on Road"><i class="fas fa-road"></i>Object on Road&nbsp;</div>
        <div class="report-button" data-alert-type="Lane Closure"><i class="fas fa-road-barrier"></i>Lane Closure&nbsp;</div>
        <div class="report-button" data-alert-type="Manual Report"><i class="fas fa-comment"></i>Manual Report&nbsp;</div>
        <div class="report-button" data-alert-type="Low Visibility"><i class="fas fa-eye-slash"></i>Low Visibility&nbsp;</div>
      </div>
      <div id="confirm-alert">
        <h3>Confirm Alert Location</h3>
        <p>Alert Type: <span id="alert-type-display"></span></p>
        <p>Location: <span id="location-display"></span></p>
        <p>Timestamp: <span id="timestamp-display"></span></p>
        <button id="post-alert-button">Post</button>
        <button id="cancel-alert-button">Cancel</button>
      </div>
    </div>
  </div>
  <div id="reroute-hud-container">
    <header>
      <button id="reroute-close">X</button>
    </header>
    <div id="reroute-hud">
      <h3>Reroute Available</h3>
      <p id="hazard-message"></p>
      <button id="accept-reroute-button">Accept</button>
      <button id="reject-reroute-button">Reject</button>
    </div>
  </div>
  <div id="toast"></div>
  <script>
    let map;
    let userMarker;
    let destMarker;
    let directionsService;
    let directionsRenderer;
    let alternativeRenderer;
    let watchId;
    let navState = {
      currentRoute: null,
      isNavigating: false,
      isFollowing: true,
      destination: null,
      userLocation: { lat: 33.083270, lng: -83.233040 },
      previousUserLocation: null,
      lastKnownPosition: null,
      routePolyline: null,
      rerouteCheckTimeout: null,
      hazardCheckInterval: null,
      deviceHeading: null,
      currentHeading: 0,
      alertState: 'IDLE', // IDLE, PLACING_ALERT, CONFIRMING_ALERT, OFFERING_REROUTE
      tempMarker: null,
      tempAlertData: null,
      alternativeRoute: null,
      mapClickListener: null,
      ignoredHazards: [],
      currentHazard: null
    };
    const API_KEY = 'AIzaSyBSW8iQAE1AjjouEu4df-Cvq1ceUMLBit4';
    const mapId = '2666b5bd496d9c6026f43f82';
    const MAX_RETRIES = 3;
    let retryCount = 0;
    const socket = io();
    const REROUTE_CHECK_INTERVAL = 30000; // 30 seconds
    const OFF_ROUTE_TOLERANCE = 50; // meters
    const HAZARD_CHECK_INTERVAL = 5000; // 5 seconds for timely alerts
    const MIN_REROUTE_DISTANCE = 500; // Minimum distance (meters) to hazard for reroute prompt
    window.addEventListener('deviceorientation', (event) => {
      if (event.webkitCompassHeading) {
        navState.deviceHeading = event.webkitCompassHeading;
      } else if (event.alpha !== null) {
        navState.deviceHeading = 360 - event.alpha;
      }
      console.log('Device orientation heading:', navState.deviceHeading);
    });
    function animate() {
      requestAnimationFrame(animate);
      TWEEN.update();
    }
    animate();
    function adjustHud() {
      const reportBox = document.getElementById('report-box');
      const rerouteHudContainer = document.getElementById('reroute-hud-container');
      const currentWidth = window.innerWidth;
      const currentHeight = window.innerHeight;
      const maxHeight = Math.min(currentHeight * 0.5, 400);
      reportBox.style.maxHeight = `${maxHeight}px`;
      reportBox.style.width = currentWidth <= 414 ? '90vw' : currentWidth <= 768 ? '80vw' : '30vw';
      reportBox.style.maxWidth = currentWidth <= 414 ? 'none' : currentWidth <= 768 ? '320px' : '300px';
      rerouteHudContainer.style.maxHeight = `${maxHeight}px`;
      rerouteHudContainer.style.width = currentWidth <= 414 ? '90vw' : currentWidth <= 768 ? '80vw' : '30vw';
      rerouteHudContainer.style.maxWidth = currentWidth <= 414 ? 'none' : currentWidth <= 768 ? '320px' : '300px';
      console.log('Huds adjusted: MaxHeight:', maxHeight, 'Width:', reportBox.style.width, 'Screen:', currentWidth, 'x', currentHeight);
    }
    async function initMap() {
      if (!window.google || !google.maps) {
        console.error('Google Maps API failed to load');
        showToast('Failed to load map. Please check your network or API key.');
        return;
      }
      const { Map } = await google.maps.importLibrary("maps");
      const { AdvancedMarkerElement } = await google.maps.importLibrary("marker");
      const { PlacesService, Autocomplete } = await google.maps.importLibrary("places");
      const { DirectionsService, DirectionsRenderer } = await google.maps.importLibrary("routes");
      const { spherical, encoding } = await google.maps.importLibrary("geometry");
      if (navigator.permissions) {
        navigator.permissions.query({ name: 'geolocation' }).then((result) => {
          if (result.state === 'denied') {
            showToast('Location access denied. Please enable in browser settings.');
          } else if (result.state === 'prompt') {
            console.log('Geolocation permission prompt will be shown.');
          } else {
            console.log('Geolocation permission granted.');
          }
        });
      }
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          (position) => {
            navState.userLocation = {
              lat: position.coords.latitude,

        const path = navState.currentRoute.routes[0].overview_path;

        let minDistance = Infinity;
        path.forEach((point, index) => {

          if (distance < minDistance) {
            minDistance = distance;
            closestIndex = index;
          }
        });
        // Simplify polyline to reduce server load (every 5th point up to 2 miles)
        let segmentDistance = 0;
        const segmentPath = [];
        for (let i = closestIndex; i < path.length; i += 5) {
          segmentPath.push(path[i]);
          if (i < path.length - 1) {
            segmentDistance += google.maps.geometry.spherical.computeDistanceBetween(path[i], path[i + 1]);

      function projectPointToLine(p, a, b) {

        const lat3 = p.lat();
        const lng3 = p.lng();
        const dx = lng2 - lng1;
        const dy = lat2 - lat1;
        if (dx === 0 && dy === 0) return a;
        const t = ((lat3 - lat1) * dy + (lng3 - lng1) * dx) / (dx * dx + dy * dy);
        if (t < 0) return a;
        if (t > 1) return b;
        return new google.maps.LatLng(lat1 + t * dy, lng1 + t * dx);
      }
      function distanceToSegment(point, a, b) {
        const proj = projectPointToLine(point, a, b);
        return google.maps.geometry.spherical.computeDistanceBetween(point, proj);
      }
      function isHazardAvoided(hazardPoint, path) {
        const BUFFER = 50; // meters - adjust as needed for "around"
        let minDist = Infinity;
        for (let i = 0; i < path.length - 1; i++) {
          const distToSegment = distanceToSegment(hazardPoint, path[i], path[i + 1]);
          minDist = Math.min(minDist, distToSegment);
        }
        return minDist > BUFFER;
      }
      async function checkAlternativeRoute(hazard) {
        return new Promise((resolve) => {
          if (!navState.userLocation || !navState.destination) {
            console.error('Missing userLocation or destination for route calculation');
            resolve(null);
            return;
          }
          directionsService.route(
            {
              origin: navState.userLocation,
              destination: navState.destination,
              travelMode: google.maps.TravelMode.DRIVING,
              provideRouteAlternatives: true
            },
            (response, status) => {
              if (status === 'OK' && response.routes && response.routes.length > 1) {
                const currentDuration = navState.currentRoute.routes[0].legs[0].duration.value;
                const hazardLatLng = new google.maps.LatLng(hazard.location.coordinates[1], hazard.location.coordinates[0]);
                let bestAlt = null;
                let bestTimeSaved = -Infinity;
                for (let i = 1; i < response.routes.length; i++) {
                  const alt = response.routes[i];
                  const altDuration = alt.legs[0].duration.value;
                  const timeSaved = currentDuration - altDuration;
                  const altPath = alt.overview_path;
                  if (isHazardAvoided(hazardLatLng, altPath)) {
                    if (timeSaved > bestTimeSaved) {
                      bestAlt = alt;
                      bestTimeSaved = timeSaved;
                    }
                  }
                }
                if (bestAlt) {
                  navState.alternativeRoute = {
                    ...response,
                    routes: [bestAlt]
                  };
                  const timeSavedMin = Math.round(bestTimeSaved / 60);
                  console.log(`Alternative route found that avoids hazard and changes time by ${timeSavedMin} minutes`);
                  resolve(timeSavedMin);
                } else {
                  console.log('No alternative route that avoids the hazard.');
                  resolve(null);
                }
              } else {
                console.error('No alternative routes available or request failed:', status);
                resolve(null);
              }
            }
          );
        });
      }
      function showRerouteHud(hazard, timeSaved) {
        const rerouteHudContainer = document.getElementById('reroute-hud-container');
        const rerouteHud = document.getElementById('reroute-hud');
        const hazardMessage = document.getElementById('hazard-message');
        let timeText = '';
        if (timeSaved > 0) {
          timeText = `saves ${timeSaved} minutes`;
        } else if (timeSaved === 0) {
          timeText = `takes the same time`;
        } else {
          timeText = `adds ${Math.abs(timeSaved)} minutes`;
        }
        hazardMessage.textContent = `${hazard.type} has been detected ahead on your route. Alternative route ${timeText} and avoids the hazard. Would you like to reroute?`;
        rerouteHud.classList.add('active');
        rerouteHudContainer.classList.add('active');
        alternativeRenderer.setMap(map);
        alternativeRenderer.setDirections(navState.alternativeRoute);
        showToast(`Hazard (${hazard.type}) detected ahead. Alternative route available.`);
        console.log(`Offering reroute for ${hazard.type} at`, hazard.location);
        navState.alertState = 'OFFERING_REROUTE';
      }
      function acceptReroute() {
        if (navState.alternativeRoute && navState.currentHazard) {
          navState.ignoredHazards.push(navState.currentHazard._id); // Ignore this hazard
          navState.currentRoute = navState.alternativeRoute;
          navState.routePolyline = navState.currentRoute.routes[0].overview_path;
          directionsRenderer.setMap(null); // Clear current route
          directionsRenderer.setMap(map); // Re-attach to map
          directionsRenderer.setDirections(navState.currentRoute);
          alternativeRenderer.setMap(null);
          updateBottomHUD(navState.currentRoute);
          updateHUD(navState.currentRoute, navState.userLocation);
          // Force map to update view
          if (navState.isFollowing) {
            map.panTo(navState.userLocation);
            map.setZoom(18);
            map.setTilt(45);
            map.setHeading(navState.currentHeading || 0);
          }
          showToast('Alternative route accepted.');
          console.log('Reroute accepted:', navState.alternativeRoute);
          navState.alertState = 'IDLE';
          navState.alternativeRoute = null;
          navState.currentHazard = null;
        }
      }
      function rejectReroute() {
        alternativeRenderer.setMap(null);
        if (navState.currentHazard) {
          navState.ignoredHazards.push(navState.currentHazard._id);
        }
        showToast('Reroute rejected, continuing on current route.');
        console.log('Reroute rejected');
        const rerouteHudContainer = document.getElementById('reroute-hud-container');
        const rerouteHud = document.getElementById('reroute-hud');
        rerouteHudContainer.classList.remove('active');
        rerouteHud.classList.remove('active');
        navState.alertState = 'IDLE';
        navState.alternativeRoute = null;
        navState.currentHazard = null;
      }
      function createAlertContent() {
        const alertContent = document.createElement('div');
        alertContent.style.cssText = `
          color: white;
          background-color: red;
          border-radius: 50%;
          width: 25px;
          height: 25px;
          display: flex;
          justify-content: center;
          align-items: center;
          font-weight: bold;
          font-family: sans-serif;
        `;
        alertContent.textContent = '!';
        return alertContent;
      }
      function showToast(message) {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.classList.add('visible-toast');
        setTimeout(() => {
          toast.classList.remove('visible-toast');
        }, 3000);
      }
      function handleGeolocationError(error, isInitial = false) {
        let message = 'Failed to get location. Please try again later.';
        if (error.code === 1) {
          message = 'Location access denied. Please enable location permissions in your browser settings.';
        } else if (error.code === 2) {
          message = 'Location unavailable. Ensure location services are enabled and try again.';
        } else if (error.code === 3) {
          message = 'Location timed out. Please try again.';
        }
        console.error(message, error);
        showToast(message);
        if (isInitial && retryCount < MAX_RETRIES) {
          retryCount++;
          const backoff = 5000 * Math.pow(2, retryCount);
          console.log(`Retrying geolocation (attempt ${retryCount}/${MAX_RETRIES}, backoff: ${backoff}ms)`);
          setTimeout(() => navigator.geolocation.getCurrentPosition(
            (position) => {
              navState.userLocation = {
                lat: position.coords.latitude,
                lng: position.coords.longitude
              };
              navState.deviceHeading = position.coords.heading || null;
              console.log('Initial location:', navState.userLocation, 'Heading:', navState.deviceHeading);
              initializeMap(google.maps.Map, google.maps.marker.AdvancedMarkerElement, google.maps.places.PlacesService, google.maps.places.Autocomplete, google.maps.DirectionsService, google.maps.DirectionsRenderer, google.maps.geometry.spherical, google.maps.geometry.encoding);
            },
            (error) => {
              console.error('Retry geolocation error:', error);
              handleGeolocationError(error, true);
            },
            {
              enableHighAccuracy: true,
              timeout: 5000,
              maximumAge: 0
            }
          ), backoff);
        } else if (isInitial) {
          navState.userLocation = { lat: 33.083270, lng: -83.233040 };
          initializeMap(google.maps.Map, google.maps.marker.AdvancedMarkerElement, google.maps.places.PlacesService, google.maps.places.Autocomplete, google.maps.DirectionsService, google.maps.DirectionsRenderer, google.maps.geometry.spherical, google.maps.geometry.encoding);
        }
      }
      const reportBox = document.getElementById('report-box');
      const header = reportBox.querySelector('header');
      const reportClose = document.getElementById('report-close');
      let isDragging = false;
      let startX, startY, initialLeft, initialTop;
      function startDrag(e) {
        if (navState.alertState === 'CONFIRMING_ALERT') return;
        isDragging = true;
        const clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
        const clientY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
        startX = clientX;
        startY = clientY;
        initialLeft = reportBox.offsetLeft;
        initialTop = reportBox.offsetTop;
        document.addEventListener('mousemove', drag);
        document.addEventListener('mouseup', stopDrag);
        document.addEventListener('touchmove', drag);
        document.addEventListener('touchend', stopDrag);
      }
      function drag(e) {
        if (!isDragging) return;
        e.preventDefault();
        const clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
        const clientY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
        const dx = clientX - startX;
        const dy = clientY - startY;
        reportBox.style.left = `${initialLeft + dx}px`;
        reportBox.style.top = `${initialTop + dy}px`;
        reportBox.style.bottom = 'auto';
        reportBox.style.right = 'auto';
      }
      function stopDrag() {
        isDragging = false;
        document.removeEventListener('mousemove', drag);
        document.removeEventListener('mouseup', stopDrag);
        document.removeEventListener('touchmove', drag);
        document.removeEventListener('touchend', stopDrag);
      }
      header.addEventListener('mousedown', startDrag);
      header.addEventListener('touchstart', startDrag);
      reportClose.addEventListener('mousedown', (e) => e.stopPropagation());
      reportClose.addEventListener('touchstart', (e) => e.stopPropagation());
      const rerouteHudContainer = document.getElementById('reroute-hud-container');
      const rerouteHeader = rerouteHudContainer.querySelector('header');
      const rerouteClose = document.getElementById('reroute-close');
      rerouteHeader.addEventListener('mousedown', startRerouteDrag);
      rerouteHeader.addEventListener('touchstart', startRerouteDrag);
      rerouteClose.addEventListener('mousedown', (e) => e.stopPropagation());
      rerouteClose.addEventListener('touchstart', (e) => e.stopPropagation());
      function startRerouteDrag(e) {
        isDragging = true;
        const clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
        const clientY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
        startX = clientX;
        startY = clientY;
        initialLeft = rerouteHudContainer.offsetLeft;
        initialTop = rerouteHudContainer.offsetTop;
        document.addEventListener('mousemove', dragReroute);
        document.addEventListener('mouseup', stopRerouteDrag);
        document.addEventListener('touchmove', dragReroute);
        document.addEventListener('touchend', stopRerouteDrag);
      }
      function dragReroute(e) {
        if (!isDragging) return;
        e.preventDefault();
        const clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
        const clientY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
        const dx = clientX - startX;
        const dy = clientY - startY;
        rerouteHudContainer.style.left = `${initialLeft + dx}px`;
        rerouteHudContainer.style.top = `${initialTop + dy}px`;
        rerouteHudContainer.style.bottom = 'auto';
        rerouteHudContainer.style.right = 'auto';
      }
      function stopRerouteDrag() {
        isDragging = false;
        document.removeEventListener('mousemove', dragReroute);
        document.removeEventListener('mouseup', stopRerouteDrag);
        document.removeEventListener('touchmove', dragReroute);
        document.removeEventListener('touchend', stopRerouteDrag);
      }
      adjustHud();
      window.addEventListener('resize', adjustHud);
      window.addEventListener('load', adjustHud);
    }
    const script = document.createElement('script');
    script.src = `https://maps.googleapis.com/maps/api/js?key=${API_KEY}&map_ids=${mapId}&v=beta&callback=initMap&libraries=places,geometry,marker&loading=async`;
    script.async = true;
    script.defer = true;
    script.onerror = () => {
      console.error('Failed to load Google Maps script');
      showToast('Failed to load map. Please check your network or API key.');
    };
    document.head.appendChild(script);
  </script>
